# CI/CD for the frontend: typecheck → build → containerize → deploy to Azure
# App Service. Pushes to main deploy dev automatically; prod is a manual
# dispatch (gate it with GitHub environment protection rules).
#
# NOTE: GitHub only executes workflows under .github/workflows/. This file
# lives in infra/github/ so the repository owner can review it and move it to
# .github/workflows/deploy-frontend.yml when ready (pushes from automation
# can't always create workflow files directly).
#
# Per-environment secrets (GitHub environments "dev" and "prod"):
#   AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID  (OIDC federated credential)
# Per-environment variables:
#   AZURE_RESOURCE_GROUP  (e.g. rg-meridian-dev)
#   ACR_NAME              (e.g. acrmeridiandev — Bicep output acrName)
#   WEB_WEBAPP_NAME       (e.g. app-meridian-web-dev — Bicep output webAppName)

name: frontend

on:
  push:
    branches: [main]
    paths: ['meridian-capital-ops/**']
  pull_request:
    paths: ['meridian-capital-ops/**']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prod]
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meridian-capital-ops
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: meridian-capital-ops/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    needs: build-test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build and push image (ACR build)
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image meridian-web:${{ github.sha }} \
            --image meridian-web:latest \
            meridian-capital-ops/
      - name: Point the web app at the new image
        run: |
          az webapp config container set \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name ${{ vars.WEB_WEBAPP_NAME }} \
            --container-image-name ${{ vars.ACR_NAME }}.azurecr.io/meridian-web:${{ github.sha }}
          az webapp restart \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name ${{ vars.WEB_WEBAPP_NAME }}
